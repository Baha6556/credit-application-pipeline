services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI: guest/guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: credit
      POSTGRES_PASSWORD: credit
      POSTGRES_DB: credit
    # порт наружу не пробрасываем: 5432 на хосте часто занят локальным Postgres,
    # а api/worker ходят в БД по внутренней сети compose

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit -d credit"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment: &app_env
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      DATABASE_URL: postgresql+psycopg2://credit:credit@postgres:5432/credit
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: python -m app.worker
    environment: *app_env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
